// ─── STORAGE ─────────────────────────────────────────────────
async function loadAccounts(){
  try{
    const r=await window.storage.get(SK,true);
    if(r&&r.value){const l=JSON.parse(r.value);if(Array.isArray(l))return l;}
  }catch(e){}
  try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}
  return[];
}
async function saveAccounts(list){
  try{await window.storage.set(SK,JSON.stringify(list),true);}catch(e){}
  try{localStorage.setItem(SK,JSON.stringify(list));}catch(e){}
}
async function upsertAccount(acc){
  const all=await loadAccounts();
  const next=all.some(a=>String(a.id)===String(acc.id))?all.map(a=>String(a.id)===String(acc.id)?acc:a):[...all,acc];
  await saveAccounts(next);
}
async function removeAccount(id){
  const all=await loadAccounts();
  await saveAccounts(all.filter(a=>String(a.id)!==String(id)));
}

// ─── API ─────────────────────────────────────────────────────
async function callAPI(prompt,max){
  const res=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:max||3000,messages:[{role:"user",content:prompt}]})});
  if(!res.ok)throw new Error("API error "+res.status);
  const d=await res.json();
  const raw=(d.content||[]).map(c=>c.text||"").join("");
  const s=raw.indexOf("{"),e=raw.lastIndexOf("}");
  if(s<0||e<0)throw new Error("No JSON in response");
  const slice=raw.slice(s,e+1);
  try{return JSON.parse(slice);}
  catch(err){
    // Sanitize without regex: replace control chars char by char
    let safe="";
    for(let i=0;i<slice.length;i++){
      const code=slice.charCodeAt(i);
      if(code===9||code===10||code===13||(code>=32&&code!==127)){safe+=slice[i];}
      else{safe+=" ";}
    }
    return JSON.parse(safe);
  }
}
function brief(acc){
  let b=`MARCA: ${acc.name}\nINDUSTRIA: ${acc.industry}\nPAIS: ${acc.country||"No especificado"}\nDESCRIPCION: ${acc.description||"Empresa destacada"}\nPUBLICO: ${acc.audience||"Adultos 25-45"}\nTONO: ${acc.tone} (positivo, afirmativo, motivador)\nNOTAS: ${acc.brandNotes||"Ninguna"}\n`;
  if(acc.instagram)b+=`INSTAGRAM: ${acc.instagram}\n`;
  if(acc.web)b+=`WEB: ${acc.web}\n`;
  return b;
}

// ─── PDF ─────────────────────────────────────────────────────
function pdfNew(){return new window.jspdf.jsPDF({unit:"mm",format:"a4"});}
function pdfHdr(doc,sub){
  const w=doc.internal.pageSize.getWidth();
  doc.setFillColor(36,3,84);doc.rect(0,0,w,28,"F");
  doc.setFont("helvetica","bold");doc.setFontSize(16);doc.setTextColor(255,255,255);
  doc.text("FENÓMENA",14,13);
  doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(238,177,215);
  doc.text("Content Grid AI"+(sub?" · "+sub:""),14,21);
  doc.setTextColor(20,20,20);return 34;
}
function pdfBreak(doc,y,need){
  if(y+need>doc.internal.pageSize.getHeight()-14){doc.addPage();return 18;}return y;
}
function downloadGridPDF(acc,cfg,pieces,insights){
  const doc=pdfNew();const pageW=doc.internal.pageSize.getWidth();const mx=14,cw=pageW-mx*2;
  let y=pdfHdr(doc,acc.name+" · "+MONTHS[cfg.month]);
  doc.setFont("helvetica","bold");doc.setFontSize(14);doc.setTextColor(36,3,84);
  doc.text("Grilla de contenido — "+MONTHS[cfg.month]+" "+new Date().getFullYear(),mx,y);y+=7;
  doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(110,90,140);
  doc.text(pieces.length+" piezas · "+acc.industry+(acc.country?" · "+acc.country:""),mx,y);y+=10;
  if(insights&&insights!=="null"){
    y=pdfBreak(doc,y,22);
    const il=doc.splitTextToSize(insights,cw-8);
    const bh=8+il.length*5;
    doc.setFillColor(245,242,253);doc.roundedRect(mx,y,cw,bh,2,2,"F");
    doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(36,3,84);
    doc.text("ANÁLISIS ESTRATÉGICO",mx+4,y+6);
    doc.setFont("helvetica","normal");doc.setFontSize(8.5);doc.setTextColor(60,50,80);
    let iy=y+11;il.forEach(l=>{doc.text(l,mx+4,iy);iy+=5;});y+=bh+8;
  }
  pieces.forEach(p=>{
    y=pdfBreak(doc,y,34);
    const al=doc.splitTextToSize(p.angle||"",cw-8);
    const bh=Math.max(28,14+al.length*4.5);
    doc.setDrawColor(225,220,242);doc.setLineWidth(0.3);doc.roundedRect(mx,y,cw,bh,2,2);
    const bl=p.isBranding?"BRANDING":(p.format||"").toUpperCase();
    doc.setFontSize(7);doc.setFont("helvetica","bold");
    const bw=doc.getTextWidth(bl)+6;
    doc.setFillColor(36,3,84);doc.roundedRect(mx+4,y+4,bw,5,1,1,"F");
    doc.setTextColor(178,245,106);doc.text(bl,mx+7,y+7.5);
    doc.setTextColor(110,90,140);doc.setFont("helvetica","normal");doc.setFontSize(8);
    doc.text((p.day||"")+(p.dayNum?" "+p.dayNum:"")+" · "+(p.postingTime||""),mx+bw+8,y+7.5);
    doc.setFont("helvetica","bold");doc.setFontSize(10);doc.setTextColor(36,3,84);
    doc.text(p.theme||"",mx+4,y+14);
    doc.setFont("helvetica","normal");doc.setFontSize(8.5);doc.setTextColor(90,80,110);
    let ly=y+19;al.forEach(l=>{doc.text(l,mx+4,ly);ly+=4.5;});
    y+=bh+5;
  });
  doc.save("Grilla_"+acc.name.replace(/[^a-z0-9]+/gi,"_")+"_"+MONTHS[cfg.month]+".pdf");
}
function downloadPiecePDF(piece,acc){
  const doc=pdfNew();const pageW=doc.internal.pageSize.getWidth();const mx=14,cw=pageW-mx*2;
  let y=pdfHdr(doc,acc.name);
  doc.setFontSize(7.5);doc.setFont("helvetica","bold");
  const bl=piece.isBranding?"BRANDING":piece.format;
  const bw=doc.getTextWidth(bl)+6;
  doc.setFillColor(36,3,84);doc.roundedRect(mx,y,bw,6,1,1,"F");
  doc.setTextColor(178,245,106);doc.text(bl,mx+3,y+4.3);
  doc.setTextColor(110,90,140);doc.setFont("helvetica","normal");doc.setFontSize(8.5);
  doc.text((piece.day||"")+(piece.dayNum?" "+piece.dayNum:"")+" · "+(piece.postingTime||""),mx+bw+4,y+4.3);
  y+=12;
  doc.setFont("helvetica","bold");doc.setFontSize(14);doc.setTextColor(36,3,84);
  const tl=doc.splitTextToSize(piece.theme||"",cw);
  tl.forEach(l=>{doc.text(l,mx,y);y+=6.5;});y+=2;
  doc.setFont("helvetica","normal");doc.setFontSize(9.5);doc.setTextColor(110,90,140);
  const al=doc.splitTextToSize(piece.angle||"",cw);
  al.forEach(l=>{doc.text(l,mx,y);y+=5;});y+=7;
  function sec(label,content){
    if(!content)return;
    y=pdfBreak(doc,y,14);
    doc.setDrawColor(235,230,245);doc.setLineWidth(0.2);doc.line(mx,y,mx+cw,y);y+=6;
    doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(150,140,170);
    doc.text(label.toUpperCase(),mx,y);y+=6;
    doc.setFont("helvetica","normal");doc.setFontSize(10);doc.setTextColor(36,3,84);
    const lines=doc.splitTextToSize(content,cw);
    lines.forEach(l=>{y=pdfBreak(doc,y,6);doc.text(l,mx,y);y+=5.5;});y+=4;
  }
  sec("Hook de apertura",piece.hook);
  sec(piece.format==="Reel"?"Script completo":"Copy",piece.script);
  sec("Caption para Instagram",piece.caption);
  sec("CTA",piece.cta);
  if(piece.frames&&piece.frames.length>0){
    y=pdfBreak(doc,y,14);
    doc.setDrawColor(235,230,245);doc.line(mx,y,mx+cw,y);y+=6;
    doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(150,140,170);
    doc.text("GUÍA DE DIAGRAMACIÓN",mx,y);y+=7;
    piece.frames.forEach(f=>{
      y=pdfBreak(doc,y,18);
      doc.setFont("helvetica","bold");doc.setFontSize(9.5);doc.setTextColor(36,3,84);
      doc.text("Frame "+f.num,mx,y);y+=5;
      doc.setFont("helvetica","normal");doc.setFontSize(8.5);doc.setTextColor(60,50,80);
      [["Visual",f.visual],["Texto",f.texto],["Colores",f.colores],["Voice off",f.voiceOff]].forEach(([l,v])=>{
        if(!v||v==="null")return;
        y=pdfBreak(doc,y,6);
        doc.setFont("helvetica","bold");doc.text(l+":",mx+2,y);
        doc.setFont("helvetica","normal");
        const ls=doc.splitTextToSize(v,cw-28);
        doc.text(ls[0]||"",mx+28,y);y+=5;
        for(let k=1;k<ls.length;k++){y=pdfBreak(doc,y,5);doc.text(ls[k],mx+28,y);y+=5;}
      });y+=3;
    });
  }
  doc.save("Pieza_"+(piece.theme||"contenido").replace(/[^a-z0-9]+/gi,"_").slice(0,40)+".pdf");
}

// ─── DOM BUILDER ─────────────────────────────────────────────
function el(tag,style,attrs,...kids){
  const node=document.createElement(tag);
  if(style)Object.assign(node.style,style);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k.startsWith("on"))node.addEventListener(k.slice(2).toLowerCase(),v);
    else node.setAttribute(k,v);
  });
  kids.flat(9).forEach(k=>{
    if(k==null||k===false)return;
    node.appendChild(typeof k==="string"||typeof k==="number"?document.createTextNode(String(k)):k);
  });
  return node;
}
function div(style,...kids){return el("div",style,null,...kids);}
function span(style,...kids){return el("span",style,null,...kids);}
function p(style,...kids){return el("p",style,null,...kids);}
function h1(style,...kids){return el("h1",style,null,...kids);}
function h2(style,...kids){return el("h2",style,null,...kids);}
function inp(style,attrs){return el("input",style,attrs);}
function sel(style,attrs,...opts){
  const s=el("select",style,attrs);
  opts.flat().forEach(o=>{const op=el("option",null,{value:o},o);s.appendChild(op);});
  return s;
}
function ta(style,attrs,...kids){return el("textarea",style,attrs,...kids);}

// ─── MODAL ───────────────────────────────────────────────────
let _modal=null;
function showModal(opts){_modal=opts;render();}
function closeModal(){_modal=null;render();}
function Modal(){
  if(!_modal)return null;
  let typed="";
  const overlay=div({position:"fixed",inset:"0",background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"9999",padding:"24px"});
  const box=div({background:WH,borderRadius:"16px",padding:"32px",maxWidth:"420px",width:"100%"},
    div({fontWeight:"800",fontSize:"16px",color:P,marginBottom:"12px"},_modal.title),
    div({fontSize:"13px",color:"#7c6ca0",lineHeight:"1.7",marginBottom:"24px"},_modal.message)
  );
  let confirmB;
  if(_modal.requireType){
    box.appendChild(div({fontSize:"12px",color:"#9e8dbf",marginBottom:"8px",fontWeight:"600"},"Escribe "+_modal.requireType+" para confirmar:"));
    const i=inp({marginBottom:"16px"},{type:"text",placeholder:_modal.requireType});
    i.addEventListener("input",e=>{typed=e.target.value;if(confirmB)confirmB.disabled=typed!==_modal.requireType;});
    box.appendChild(i);
  }
  const row=div({display:"flex",gap:"12px"});
  row.appendChild(btn("Cancelar",closeModal,"outline",{flex:"1"}));
  confirmB=btn(_modal.confirmLabel||"Confirmar",()=>{if(!_modal.requireType||typed===_modal.requireType)_modal.onConfirm();},_modal.confirmVariant||"primary",{flex:"1"});
  if(_modal.requireType)confirmB.disabled=true;
  row.appendChild(confirmB);
  box.appendChild(row);overlay.appendChild(box);
  return overlay;
}

};

// ─── RENDER ──────────────────────────────────────────────────
function render(){
  if(funnyTimer&&!S.loading){clearInterval(funnyTimer);funnyTimer=null;}
  const root=document.getElementById("app");
  while(root.firstChild)root.removeChild(root.firstChild);
  let view;
  if(!S.userName)view=ViewWelcome();
  else if(S.view==="loading")view=ViewLoading();
  else if(S.view==="editAccount")view=ViewEditAccount();
  else if(S.view==="history")view=ViewHistory();
  else if(S.view==="configGrid")view=ViewConfigGrid();
  else if(S.view==="draftResume")view=ViewDraftResume();
  else if(S.view==="grid"){
    if(S.detailPiece)view=ViewDetail();
    else if(S.showCal)view=ViewCalendar();
    else view=ViewGrid();
  }else view=ViewHome();
  if(view)root.appendChild(view);
  const m=Modal();if(m)root.appendChild(m);
}

// ─── GENERATE ─────────────────────────────────────────────────
async function doGenerate(cfg){
  S.gridCfg=cfg;S.pieces=[];S.insights=null;S.loadErr=null;S.detailPiece=null;S.showCal=false;S.approved=false;S.addingExtra=false;S.loading=true;S.view="grid";render();
  const acc=S.selected,monthName=MONTHS[cfg.month];
  const mix=IMIX[acc.industry]||IMIX["Otro"];
  const past=(acc.history||[]).slice(-4).map(h=>h.month+": "+h.themes.join(", ")).join(" | ");
  let prompt="Eres experto en marketing. Genera la ESTRUCTURA de una grilla de "+monthName+" para Instagram.\n\n== BRIEF ==\n"+brief(acc);
  if(past)prompt+="HISTORIAL: "+past+"\n";
  prompt+="MES: "+monthName+"\nEFEMERIDES de "+(acc.country||"el pais")+" para "+monthName+" (nacionales y globales).\nMIX:\n";
  mix.forEach((m,i)=>{prompt+=(i+1)+". "+m+"\n";});
  if(acc.extraCategories&&acc.extraCategories.length)acc.extraCategories.forEach((c,i)=>{prompt+=(mix.length+i+1)+". "+c+"\n";});
  prompt+="FORMATOS: "+JSON.stringify(cfg.formatMix)+"\nREGLAS: 1 BRANDING (isBranding:true), no repetir consecutivo, dayNum 1-28, tono positivo, especifico para "+acc.name+".\n";
  prompt+='JSON sin markdown: {"insights":"texto o null","efemerides":["e1"],"pieces":[{"id":1,"format":"Reel","day":"Lunes","dayNum":5,"postingTime":"18:00","theme":"titulo","angle":"angulo","category":"Educativo","seasonalTie":"fecha o null","slides":null,"isBranding":false}]}';
  try{
    const parsed=await callAPI(prompt,4500);
    const np=parsed.pieces||[];S.pieces=np;S.insights=parsed.insights||null;
    const he={month:monthName,year:new Date().getFullYear(),themes:np.map(x=>x.theme),insights:parsed.insights||null,efemerides:parsed.efemerides||[],approved:false,approvedNotes:null,timestamp:Date.now()};
    const ua={...acc,history:[...(acc.history||[]),he],owner:S.userName};
    await saveDraft(ua,np,parsed.insights||null,false,cfg);
  }catch(err){S.loadErr=err.message||"Error";}
  S.loading=false;render();
}

async function fetchDetail(piece,feedback){

  if(piece.isBranding)pr+="TIPO: Branding\n";if(piece.seasonalTie&&piece.seasonalTie!=="null")pr+="Efemeride: "+piece.seasonalTie+"\n";if(piece.slides)pr+="Slides: "+piece.slides+"\n";if(feedback)pr+="DIRECTRIZ: "+feedback+"\n";

  S.pieces=S.pieces.map(x=>x.id===piece.id?updated:x);

  return updated;

        es.appendChild(div({fontSize:"10px",fontWeight:"700",color:"#9e8dbf",marginBottom:"8px",textTransform:"uppercase",letterSpacing:".5px"},"Efemérides"));
        const er=div({display:"flex",flexWrap:"wrap",gap:"6px"});
        hE.efemerides.forEach(e=>er.appendChild(Tag("📅 "+e,CY)));
        es.appendChild(er);c.appendChild(es);
      }
      const tRow=div({display:"flex",flexWrap:"wrap",gap:"6px"});
      hE.themes.forEach(t=>tRow.appendChild(span({background:"#f0eafa",color:P,fontSize:"11px",padding:"4px 11px",borderRadius:"5px"},t)));
      c.appendChild(tRow);body.appendChild(c);
    });
  }
  wrap.appendChild(body);return wrap;
}

// ─── INIT ─────────────────────────────────────────────────────
async function init(){
  const saved=localStorage.getItem("fg_username");
  if(saved){
    S.userName=saved;S.view="loading";render();
    const all=await loadAccounts();
    S.accounts=all.filter(a=>a.owner===saved);
    S.view="home";
  }else{
    S.view="welcome";
    setTimeout(()=>startWelcomeAnim(),100);
  }
  render();
}
init();
</script>
